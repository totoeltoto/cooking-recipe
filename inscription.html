<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inscription — Le Coin Gourmand</title>
  <link rel="stylesheet" href="auth.css">
</head>
<body>

  <a href="index.html" class="back-link">
    <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
      <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
    </svg>
    Retour à l'accueil
  </a>

  <div class="auth-card">
    <p class="auth-logo">Le Coin Gourmand</p>
    <div class="auth-divider"></div>
    <h1 class="auth-title">Créer un compte</h1>
    <p class="auth-subtitle">Rejoignez la communauté gourmande !</p>

    <div id="message-container" role="alert"></div>

    <form id="register-form" novalidate>
      <div class="field">
        <label for="email">Adresse e-mail</label>
        <input type="email" id="email" placeholder="vous@exemple.fr" autocomplete="email" required>
      </div>
      <div class="field">
        <label for="password">Mot de passe</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="new-password" required>
      </div>
      <div class="field">
        <label for="role">Vous êtes ?</label>
        <select id="role">
          <option value="utilisateur">Un utilisateur gourmand</option>
          <option value="admin">Un administrateur</option>
          <option value="co-fondateur">Un co-fondateur</option>
          <option value="fondateur">Le fondateur</option>
        </select>
      </div>
      <div class="field hidden" id="secret-code-container">
        <label for="secret-code">Code secret</label>
        <input type="password" id="secret-code" placeholder="Code réservé aux rôles spéciaux">
      </div>
      <button type="submit" class="btn-primary">Créer mon compte</button>
    </form>

    <p class="auth-footer">
      Déjà un compte ? <a href="login.html">Se connecter</a>
    </p>
  </div>

  <script src="inscription.js"></script>
</body>
</html>
