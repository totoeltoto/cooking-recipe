<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion — Le Coin Gourmand</title>
  <link rel="stylesheet" href="auth.css">
</head>
<body>

  <a href="index.html" class="back-link">
    <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
      <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
    </svg>
    Retour à l'accueil
  </a>

  <div class="auth-card">
    <p class="auth-logo">Le Coin Gourmand</p>
    <div class="auth-divider"></div>
    <h1 class="auth-title">Se connecter</h1>
    <p class="auth-subtitle">Bon retour parmi nous !</p>

    <div id="message-container" role="alert"></div>

    <form id="login-form" novalidate>
      <div class="field">
        <label for="email">Adresse e-mail</label>
        <input type="email" id="email" placeholder="vous@exemple.fr" autocomplete="email" required>
      </div>
      <div class="field">
        <label for="password">Mot de passe</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn-primary">Se connecter</button>
    </form>

    <p class="auth-footer">
      Pas encore de compte ? <a href="inscription.html">S'inscrire</a>
    </p>
  </div>

  <script src="login.js"></script>
</body>
</html>
