<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Salade Tomate Mozzarella — Le Coin Gourmand</title>
  <link rel="stylesheet" href="../recette.css">
</head>
<body>

<header class="recipe-header">
  <div class="header-left">
    <a href="/index.html" class="back-link">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
      </svg>
      Le Coin Gourmand
    </a>
  </div>
  <div class="header-right">
    <button id="btn-print" class="header-btn" title="Imprimer la recette">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"/>
      </svg>
    </button>
    <div class="share-wrapper">
      <button id="btn-share" class="header-btn" title="Partager la recette">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z"/>
        </svg>
      </button>
      <div id="share-panel">
        <h4>Partager la recette</h4>
        <div id="qr-container"></div>
        <button id="btn-copy-link">📋 Copier le lien</button>
      </div>
    </div>
    <button id="dark-mode-toggle" class="header-btn" aria-label="Changer le thème" style="border-radius:50%;">
      <svg id="theme-icon-sun" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
      </svg>
      <svg id="theme-icon-moon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="display:none;">
        <path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
      </svg>
    </button>
  </div>
</header>

<main>

  <!-- Hero -->
  <div class="recipe-hero">
    <h1>Salade Tomate Mozzarella</h1>
    <img src="/images/salade.jpg" alt="Salade Tomate Mozzarella" class="hero-img" loading="eager">
  </div>

  <!-- Info bar -->
  <div class="info-bar">
    <div class="info-item">
      <span class="label">Difficulté</span>
      <span class="value diff-badge diff-facile">Très Facile</span>
    </div>
    <div class="info-item">
      <span class="label">Temps total</span>
      <span class="value">~10 min</span>
    </div>
    <div class="portions-ctrl">
      <span class="label" id="portion-label">personnes</span>
      <div class="portions-row">
        <button class="btn-qty" id="btn-minus" aria-label="Moins">−</button>
        <input type="number" id="portions-input" value="2" min="1" max="20">
        <button class="btn-qty" id="btn-plus" aria-label="Plus">+</button>
      </div>
    </div>
  </div>

  <!-- Layout -->
  <div class="recipe-layout">

    <!-- Ingrédients -->
    <aside class="card" style="align-self:start;">
      <h2 class="card-title">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
        </svg>
        Ingrédients
      </h2>
      <ul class="ingredients-list" id="ingredients-list"></ul>
    </aside>

    <!-- Étapes -->
    <article class="card">
      <h2 class="card-title">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/>
        </svg>
        Préparation
      </h2>
      <ol class="steps-list" id="steps-list"></ol>
    </article>

  </div>

  <!-- Navigation -->
  <nav class="recipe-nav">
    <a href="/index.html" class="nav-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/>
      </svg>
      Accueil
    </a>
    <a href="cookie2.html" class="nav-btn primary">
      Recette suivante
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/>
      </svg>
    </a>
  </nav>


  <!-- Commentaires -->
  <section class="comments-section">
    <div class="comments-header">
      <h2>Commentaires <span id="comments-count"></span></h2>
    </div>

    <!-- Formulaire -->
    <form id="comment-form">
      <div class="form-row">
        <div class="form-field">
          <label for="comment-author">Votre prénom</label>
          <input type="text" id="comment-author" placeholder="Ex : Marie" maxlength="40" required>
        </div>
        <div class="form-field form-stars-row">
          <label>Votre note</label>
          <div class="form-stars">
            <button type="button" class="form-star" data-value="1">★</button>
            <button type="button" class="form-star" data-value="2">★</button>
            <button type="button" class="form-star" data-value="3">★</button>
            <button type="button" class="form-star" data-value="4">★</button>
            <button type="button" class="form-star" data-value="5">★</button>
          </div>
        </div>
      </div>
      <div class="form-field" style="margin-bottom:0.85rem;">
        <label for="comment-text">Votre commentaire</label>
        <textarea id="comment-text" rows="3" placeholder="Partagez votre expérience avec cette recette…" required></textarea>
      </div>
      <button type="submit" class="btn-submit-comment">Publier le commentaire</button>
    </form>

    <div id="comments-list"></div>
  </section>
</main>

<footer>
  <p>&copy; 2025 Le Coin Gourmand. Tous droits réservés.</p>
</footer>

</body>
